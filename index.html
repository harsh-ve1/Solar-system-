<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Engine V5 - Cinematic Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Consolas', monospace; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }

        #loader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a0a1a 0%, #000 100%); z-index: 100; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: #fff; transition: opacity 1.5s ease-out;
        }
        .core { width: 60px; height: 60px; border-radius: 50%; border: 2px solid transparent; border-top-color: #ff5500; border-bottom-color: #00eeff; animation: spin 1s linear infinite; box-shadow: 0 0 30px rgba(255, 85, 0, 0.5); }
        @keyframes spin { to { transform: rotate(360deg); } }

        #hud {
            position: absolute; bottom: 30px; left: 30px; z-index: 10; color: #fff;
            background: rgba(0, 5, 10, 0.7); padding: 25px; border-radius: 12px;
            border: 1px solid rgba(0, 238, 255, 0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px); pointer-events: none;
        }
        h1 { font-size: 1.2rem; letter-spacing: 4px; color: #00eeff; text-transform: uppercase; margin-bottom: 15px; }
        .data-row { font-size: 0.85rem; color: #8899aa; margin-bottom: 8px; display: flex; justify-content: space-between; gap: 20px;}
        .highlight { color: #fff; font-weight: bold; text-shadow: 0 0 8px rgba(255,255,255,0.5); }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #00ff00; box-shadow: 0 0 10px #00ff00; margin-right: 8px; animation: pulse 2s infinite; }
        @keyframes pulse { 50% { opacity: 0.4; } }

        #webcam-container {
            position: absolute; top: 30px; right: 30px; z-index: 10; width: 140px; height: 105px; 
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; overflow: hidden; transform: scaleX(-1);
        }
        video { width: 100%; height: 100%; object-fit: cover; opacity: 0.3; filter: grayscale(100%); }
    </style>
</head>
<body>

    <div id="loader">
        <div class="core"></div>
        <h2 style="margin-top: 25px; font-weight: 300; letter-spacing: 5px; font-size: 1rem;">INITIALIZING QUANTUM ENGINE</h2>
    </div>

    <div id="hud">
        <h1>System Status</h1>
        <div class="data-row"><span>AI Uplink:</span> <span class="highlight"><span class="status-dot"></span><span id="track-status">Scanning...</span></span></div>
        <div class="data-row"><span>Camera Mode:</span> <span id="cam-mode" class="highlight">Cinematic Auto</span></div>
        <div class="data-row" style="margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
            <span>1 Hand: Orbital Override</span><br>
            <span>2 Hands: Quantum Zoom</span>
        </div>
    </div>

    <div id="webcam-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <script>
        // ==========================================
        // 1. ENGINE SETUP (Logarithmic Depth for massive scale)
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010103);
        scene.fog = new THREE.FogExp2(0x010103, 0.00015); 

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 50000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3;
        document.body.appendChild(renderer.domElement);

        // ==========================================
        // 2. POST-PROCESSING (Cinematic Glow)
        // ==========================================
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(new THREE.RenderPass(scene, camera));
        
        const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.0, 0.6, 0.1);
        composer.addPass(bloomPass);

        // ==========================================
        // 3. GLSL SHADERS (The Magic Sauce)
        // ==========================================
        // A. Custom Sun Shader (Simulates boiling plasma without images)
        const sunVertexShader = `
            varying vec2 vUv;
            varying vec3 vNormal;
            void main() {
                vUv = uv;
                vNormal = normalize(normalMatrix * normal);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;
        const sunFragmentShader = `
            uniform float time;
            varying vec2 vUv;
            varying vec3 vNormal;
            
            // Basic noise function
            float random(vec2 st) { return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123); }
            
            void main() {
                vec2 pos = vUv * 10.0;
                float n = random(floor(pos) + time * 0.1);
                
                // Color gradient (Yellow to Deep Orange)
                vec3 color1 = vec3(1.0, 0.9, 0.4);
                vec3 color2 = vec3(1.0, 0.3, 0.0);
                vec3 finalColor = mix(color2, color1, n + vNormal.z * 0.5);
                
                // Intense brightness for bloom
                gl_FragColor = vec4(finalColor * 2.5, 1.0);
            }
        `;

        // B. Atmosphere Shader (Glowing edge around planets like Earth)
        const atmosphereVertex = `
            varying vec3 vNormal;
            void main() {
                vNormal = normalize(normalMatrix * normal);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;
        const atmosphereFragment = `
            uniform vec3 glowColor;
            varying vec3 vNormal;
            void main() {
                float intensity = pow(0.65 - dot(vNormal, vec3(0, 0, 1.0)), 4.0);
                gl_FragColor = vec4(glowColor, 1.0) * intensity;
            }
        `;

        // ==========================================
        // 4. CELESTIAL CONSTRUCTION
        // ==========================================
        // Ambient Star Light
        scene.add(new THREE.AmbientLight(0x1a1a1a));

        // Point Light from Sun
        const sunLight = new THREE.PointLight(0xffeedd, 8, 8000, 0.02);
        scene.add(sunLight);

        // Build Sun using Custom Shader
        const sunUniforms = { time: { value: 0.0 } };
        const sunMat = new THREE.ShaderMaterial({
            uniforms: sunUniforms,
            vertexShader: sunVertexShader,
            fragmentShader: sunFragmentShader
        });
        const sun = new THREE.Mesh(new THREE.SphereGeometry(60, 64, 64), sunMat);
        scene.add(sun);

        // Procedural Texture Generator (Creates Bump Maps & Diffuse Maps on the fly)
        function createPlanetTexture(baseHex, noiseHex, createBump = false) {
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = baseHex;
            ctx.fillRect(0, 0, 1024, 512);
            for (let i = 0; i < 8000; i++) {
                ctx.fillStyle = createBump ? `rgba(255,255,255,${Math.random()*0.3})` : noiseHex;
                ctx.globalAlpha = Math.random() * 0.3;
                ctx.beginPath();
                ctx.arc(Math.random() * 1024, Math.random() * 512, Math.random() * 15, 0, Math.PI * 2);
                ctx.fill();
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        // Planetary Data (Adding Eccentricity for elliptical orbits)
        const planets = [];
        const planetData = [
            { name: "Mercury", size: 3.5, a: 140, b: 130, speed: 0.02, col: "#666", nCol: "#333", metal: 0.8, rough: 0.4 },
            { name: "Venus", size: 8.5, a: 220, b: 215, speed: 0.012, col: "#e3bb76", nCol: "#a67c00", metal: 0.2, rough: 0.9 },
            { name: "Earth", size: 9.5, a: 320, b: 310, speed: 0.009, col: "#0b3d91", nCol: "#4ca832", metal: 0.3, rough: 0.7, atmo: new THREE.Color(0x4477ff) },
            { name: "Mars", size: 5.5, a: 420, b: 390, speed: 0.007, col: "#c1440e", nCol: "#5c1f04", metal: 0.4, rough: 0.8 },
            { name: "Jupiter", size: 28, a: 650, b: 640, speed: 0.003, col: "#c88b3a", nCol: "#a67c00", metal: 0.1, rough: 0.9 },
            { name: "Saturn", size: 22, a: 950, b: 920, speed: 0.002, col: "#f4e2bb", nCol: "#b5a37f", metal: 0.1, rough: 0.8, hasRings: true },
        ];

        planetData.forEach(data => {
            const pivot = new THREE.Group();
            scene.add(pivot);

            // Using PBR (Physically Based Rendering) Material
            const tex = createPlanetTexture(data.col, data.nCol, false);
            const bump = createPlanetTexture("#000", "#fff", true);
            const mat = new THREE.MeshStandardMaterial({ 
                map: tex, bumpMap: bump, bumpScale: 0.5, 
                metalness: data.metal, roughness: data.rough 
            });
            
            const mesh = new THREE.Mesh(new THREE.SphereGeometry(data.size, 64, 64), mat);
            pivot.add(mesh);

            // Add Atmospheric Shader if Earth
            if (data.atmo) {
                const atmoMat = new THREE.ShaderMaterial({
                    uniforms: { glowColor: { value: data.atmo } },
                    vertexShader: atmosphereVertex,
                    fragmentShader: atmosphereFragment,
                    side: THREE.BackSide, blending: THREE.AdditiveBlending, transparent: true
                });
                const atmoMesh = new THREE.Mesh(new THREE.SphereGeometry(data.size * 1.2, 64, 64), atmoMat);
                mesh.add(atmoMesh);
            }

            // Saturn Rings (Advanced geometry)
            if (data.hasRings) {
                const ringGeo = new THREE.RingGeometry(data.size + 10, data.size + 40, 128);
                // UV mapping fix for rings
                const pos = ringGeo.attributes.position;
                const v3 = new THREE.Vector3();
                for (let i = 0; i < pos.count; i++){
                    v3.fromBufferAttribute(pos, i);
                    ringGeo.attributes.uv.setXY(i, v3.length() < (data.size+25) ? 0 : 1, 1);
                }
                const ringMat = new THREE.MeshStandardMaterial({ 
                    map: createPlanetTexture("#b5a37f", "#555"), side: THREE.DoubleSide, transparent: true, opacity: 0.8 
                });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI / 1.9;
                mesh.add(ring);
            }

            // Elliptical Orbit Trail Calculation
            const trailPts = [];
            for (let i = 0; i <= 128; i++) {
                const theta = (i / 128) * Math.PI * 2;
                trailPts.push(new THREE.Vector3(Math.cos(theta) * data.a, 0, Math.sin(theta) * data.b));
            }
            const trail = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(trailPts),
                new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.1 })
            );
            scene.add(trail);

            planets.push({ mesh, speed: data.speed, a: data.a, b: data.b, angle: Math.random() * Math.PI * 2 });
        });

        // ==========================================
        // 5. DEEP SPACE GALAXY & NEBULA
        // ==========================================
        const starsGeo = new THREE.BufferGeometry();
        const starsPos = new Float32Array(15000 * 3);
        const starsCol = new Float32Array(15000 * 3);
        
        for(let i=0; i<15000; i++) {
            const r = 2000 + Math.random() * 8000;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            
            starsPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
            starsPos[i*3+1] = r * Math.cos(phi) * 0.3; // Flatten galaxy
            starsPos[i*3+2] = r * Math.sin(phi) * Math.sin(theta);

            // Blue/Pink Nebula Colors
            const mix = Math.random();
            starsCol[i*3] = mix > 0.5 ? 0.2 : 0.8; // R
            starsCol[i*3+1] = 0.4;                 // G
            starsCol[i*3+2] = mix > 0.5 ? 0.9 : 0.4; // B
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
        starsGeo.setAttribute('color', new THREE.BufferAttribute(starsCol, 3));
        const stars = new THREE.Points(starsGeo, new THREE.PointsMaterial({ size: 4, vertexColors: true, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending }));
        scene.add(stars);

        // ==========================================
        // 6. CAMERA & PHYSICS LOOP
        // ==========================================
        let camRadius = 1200, camTheta = Math.PI / 4, camPhi = Math.PI / 2.5;
        let targetCamRadius = 1200, targetCamTheta = Math.PI / 4, targetCamPhi = Math.PI / 2.5;
        
        let isManualControl = false;
        let autoTourAngle = 0;
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const elapsed = clock.getElapsedTime();

            // Update Sun Shader Time
            sunUniforms.time.value = elapsed;
            sun.rotation.y += 0.002;
            stars.rotation.y -= 0.0001;

            // Keplerian Orbital Mechanics
            planets.forEach(p => {
                p.angle += p.speed * 60 * delta;
                // Elliptical Math
                p.mesh.position.x = Math.cos(p.angle) * p.a;
                p.mesh.position.z = Math.sin(p.angle) * p.b;
                p.mesh.rotation.y += p.speed * 100 * delta; // Self spin
            });

            // Camera AI (Auto-Tour vs Manual)
            if (!isManualControl) {
                autoTourAngle += 0.001;
                targetCamTheta = autoTourAngle;
                targetCamPhi = (Math.sin(elapsed * 0.2) * 0.3) + Math.PI/2.5; // Smooth bobbing
            }

            // Smooth Damping (Lerp)
            camTheta += (targetCamTheta - camTheta) * 0.05;
            camPhi += (targetCamPhi - camPhi) * 0.05;
            camRadius += (targetCamRadius - camRadius) * 0.08;

            camera.position.x = camRadius * Math.sin(camPhi) * Math.cos(camTheta);
            camera.position.y = camRadius * Math.cos(camPhi);
            camera.position.z = camRadius * Math.sin(camPhi) * Math.sin(camTheta);
            camera.lookAt(0, 0, 0);

            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // ==========================================
        // 7. MEDIAPIPE GESTURE INTEGRATION
        // ==========================================
        const videoElement = document.getElementById('webcam');
        const statusEl = document.getElementById('track-status');
        const modeEl = document.getElementById('cam-mode');
        const loader = document.getElementById('loader');

        let initDone = false;
        let lastDetectionTime = 0;

        function onResults(results) {
            if (!initDone) {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 1500);
                initDone = true;
                animate(); // Start animation once loaded
            }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                lastDetectionTime = Date.now();
                isManualControl = true;
                statusEl.innerText = `ACTIVE (${results.multiHandLandmarks.length})`;
                modeEl.innerText = "Manual Override";
                modeEl.style.color = "#ff5500";

                if (results.multiHandLandmarks.length === 1) {
                    const h = results.multiHandLandmarks[0][0]; 
                    targetCamTheta = (1 - h.x) * Math.PI * 3; 
                    targetCamPhi = Math.max(0.1, Math.min(Math.PI - 0.1, h.y * Math.PI)); 
                } 
                else if (results.multiHandLandmarks.length === 2) {
                    const h1 = results.multiHandLandmarks[0][0]; 
                    const h2 = results.multiHandLandmarks[1][0]; 
                    const dist = Math.sqrt(Math.pow(h1.x - h2.x, 2) + Math.pow(h1.y - h2.y, 2));
                    targetCamRadius = 3000 - (dist * 4000);
                    targetCamRadius = Math.max(200, Math.min(targetCamRadius, 3000)); 
                }
            } else {
                // Return to auto-tour if no hands detected for 2 seconds
                if (Date.now() - lastDetectionTime > 2000) {
                    isManualControl = false;
                    statusEl.innerText = "Searching...";
                    modeEl.innerText = "Cinematic Auto";
                    modeEl.style.color = "#00eeff";
                    targetCamRadius = 1200; // Reset zoom slowly
                }
            }
        }

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({
            maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6
        });
        hands.onResults(onResults);

        new Camera(videoElement, {
            onFrame: async () => { await hands.send({ image: videoElement }); },
            width: 480, height: 360
        }).start();

    </script>
</body>
</html>
