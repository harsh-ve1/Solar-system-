<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cosmic Engine - MediaPipe</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #020204; font-family: monospace; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }

        /* HUD Overlay */
        #hud {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 10;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0,255,204,0.5);
            pointer-events: none;
        }
        h1 { font-size: 1.5rem; letter-spacing: 4px; margin-bottom: 5px; text-transform: uppercase; }
        .stat { color: #888; font-size: 0.85rem; margin-top: 4px; }
        .highlight { color: #fff; }

        /* Camera Box */
        #webcam-container {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 10;
            width: 160px;
            height: 120px;
            border: 1px solid #00ffcc;
            box-shadow: 0 0 15px rgba(0,255,204,0.2);
            border-radius: 6px;
            overflow: hidden;
            transform: scaleX(-1); /* Mirror view */
            background: #000;
        }
        video { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
    </style>
</head>
<body>

    <div id="hud">
        <h1>Cosmic Engine v2.0</h1>
        <div class="stat">AI Tracker: <span id="track-status" class="highlight">Booting Core...</span></div>
        <div class="stat">Controls: <span class="highlight">1 Hand = Pan | 2 Hands = Zoom (Pinch)</span></div>
    </div>

    <div id="webcam-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <script>
        // --- THREE.JS ENGINE SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020204, 0.0015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 350, 600);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Target positions for smooth interpolation (Easing)
        let targetCamX = 0, targetCamY = 350, targetCamZ = 600;

        // Lighting (The Sun is the light source)
        const ambientLight = new THREE.AmbientLight(0x333333);
        scene.add(ambientLight);

        const sunLight = new THREE.PointLight(0xffffff, 2, 1200, 0.5);
        scene.add(sunLight);

        // Starfield Background
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 3000;
        const starPositions = new Float32Array(starsCount * 3);
        for(let i = 0; i < starsCount * 3; i++) {
            starPositions[i] = (Math.random() - 0.5) * 1500;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 1.2, sizeInverse: false });
        const starField = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starField);

        // Sun Construction
        const sunGeo = new THREE.SphereGeometry(30, 32, 32);
        const sunMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        scene.add(sun);

        // Detailed Planet Blueprint
        const planetData = [
            { name: "Mercury", size: 3.2, dist: 70, speed: 0.03, color: 0x888888 },
            { name: "Venus", size: 5.8, dist: 110, speed: 0.02, color: 0xe3bb76 },
            { name: "Earth", size: 6.5, dist: 160, speed: 0.015, color: 0x2277ff },
            { name: "Mars", size: 4.5, dist: 210, speed: 0.01, color: 0xcc4400 },
            { name: "Jupiter", size: 18, dist: 300, speed: 0.007, color: 0xd4a373 },
            { name: "Saturn", size: 14, dist: 400, speed: 0.004, color: 0xf4e2bb, hasRings: true },
            { name: "Uranus", size: 9.5, dist: 490, speed: 0.002, color: 0x70d6ff },
            { name: "Neptune", size: 9.0, dist: 570, speed: 0.001, color: 0x3a86ff }
        ];

        const planetMeshes = [];

        planetData.forEach(data => {
            // Orbit Line
            const orbitGeo = new THREE.RingGeometry(data.dist - 0.5, data.dist + 0.5, 64);
            const orbitMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, opacity: 0.04, transparent: true });
            const orbit = new THREE.Mesh(orbitGeo, orbitMat);
            orbit.rotation.x = Math.PI / 2;
            scene.add(orbit);

            // Planet Sphere
            const geom = new THREE.SphereGeometry(data.size, 32, 32);
            const mat = new THREE.MeshStandardMaterial({ color: data.color, roughness: 0.7, metalness: 0.1 });
            const mesh = new THREE.Mesh(geom, mat);
            
            mesh.userData = { dist: data.dist, speed: data.speed, angle: Math.random() * Math.PI * 2 };
            scene.add(mesh);
            planetMeshes.push(mesh);

            // Saturn Rings
            if(data.hasRings) {
                const ringGeo = new THREE.RingGeometry(data.size + 4, data.size + 15, 32);
                const ringMat = new THREE.MeshStandardMaterial({ color: 0xa6957b, side: THREE.DoubleSide, transparent: true, opacity: 0.6 });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI / 2.3; // Tilted rings
                mesh.add(ring);
            }
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            // Smoothly ease camera to targets
            camera.position.x += (targetCamX - camera.position.x) * 0.05;
            camera.position.y += (targetCamY - camera.position.y) * 0.05;
            camera.position.z += (targetCamZ - camera.position.z) * 0.05;
            camera.lookAt(0, 0, 0);

            // Rotate Sun
            sun.rotation.y += 0.002;

            // Orbit Mechanics
            planetMeshes.forEach(mesh => {
                mesh.userData.angle += mesh.userData.speed;
                mesh.position.x = Math.cos(mesh.userData.angle) * mesh.userData.dist;
                mesh.position.z = Math.sin(mesh.userData.angle) * mesh.userData.dist;
                mesh.rotation.y += 0.01; // Self rotation
            });

            renderer.render(scene, camera);
        }
        animate();

        // Window resize scaling
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });


        // --- MEDIAPIPE AI HAND TRACKING ---
        const videoElement = document.getElementById('webcam');
        const statusEl = document.getElementById('track-status');

        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                statusEl.innerText = `ONLINE (${results.multiHandLandmarks.length} Hand(s) Detected)`;
                statusEl.style.color = "#00ffcc";

                // SCENARIO 1: ONE HAND CONTROL (PANNING CAMERA)
                if (results.multiHandLandmarks.length === 1) {
                    const hand = results.multiHandLandmarks[0];
                    // Base tracking on wrist position (index 0)
                    const x = hand[0].x - 0.5; // Normalize to -0.5 to 0.5
                    const y = hand[0].y - 0.5;

                    targetCamX = x * 800;
                    targetCamY = (y * 500) + 350; // Keep overhead viewpoint offset
                } 
                
                // SCENARIO 2: TWO HAND CONTROL (PINCH TO ZOOM ENGINE)
                else if (results.multiHandLandmarks.length === 2) {
                    const hand1 = results.multiHandLandmarks[0][0]; // Wrist 1
                    const hand2 = results.multiHandLandmarks[1][0]; // Wrist 2

                    // Calculate Euclidean $3D$ distance between both wrists
                    const dx = hand1.x - hand2.x;
                    const dy = hand1.y - hand2.y;
                    const dz = hand1.z - hand2.z;
                    const distance = Math.sqrt(dx*dx + dy*dy + dz*dz);

                    // Dynamic mapping of distance to camera zoom range [250, 950]
                    targetCamZ = 950 - (distance * 1000);
                    targetCamZ = Math.max(250, Math.min(targetCamZ, 950)); // Bound limits
                }
            } else {
                statusEl.innerText = "SEARCHING FOR HAND SIGNALS...";
                statusEl.style.color = "#ff3366";
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });
        hands.onResults(onResults);

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        
        statusEl.innerText = "Initializing Camera Engine...";
        cameraFeed.start();
    </script>
</body>
</html>
